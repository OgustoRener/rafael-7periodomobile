<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <main class="main-content">
        <h1>Cadastrar Produto</h1>
        <form th:action="@{/produtos/cadastrar}" th:object="${produto}" method="post">
            <div>
                <label>Nome:</label>
                <input type="text" th:field="*{nome}" placeholder="Nome do produto" />
            </div>
            <div>
                <label>Quantidade:</label>
                <input type="number" th:field="*{quantidade}" />
            </div>
            <div>
                <label>Valor:</label>
                <input type="number" step="0.01" th:field="*{valor}" placeholder="0.00" />
            </div>
            <button type="submit" class="botao">Salvar</button>
        </form>
    </main>

    <footer>
        <p>(c) 2025 Meu App</p>
    </footer>
</body>
</html>
